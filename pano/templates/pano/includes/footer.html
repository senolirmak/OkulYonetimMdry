<footer class="ticker">
  <div class="ticker-inner">
    <span id="tickerText">
      {% if DUYURULAR and DUYURULAR|length %}
        {% for d in DUYURULAR %}

        {% endfor %}
      {% else %}
        📢 Hoş geldiniz   |   🔔 Dersler zamanında başlar
      {% endif %}
    </span>
  </div>
</footer>
