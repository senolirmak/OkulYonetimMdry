{% extends "pano/layouts/base.html" %}
{% load static %}

{% block content %}
<!-- ANA GÖRÜNÜM -->
    <div class="view">
        <div class="split">

            <!-- SOL: SAAT -->
            <div class="clock">
                <div id="time" class="time">00:00</div>
                <div id="date" class="date">01.01.2026</div>
                <div id="day" class="day">PAZARTESİ</div>

                <!-- SAYAÇ ALANI -->
                <div class="counter-section">
                    <div id="counterTitle" class="counter-title">KALAN SÜRE</div>
                    <div id="counterValue" class="counterValue">--:--</div>
                    <div id="counterSub" class="counterSub">Sonraki ders: --</div>
                </div>
            </div>

            <!-- SAĞ PANEL -->
            <div class="panel">
                <div id="mediaTitle" class="media-title"></div>

                <div class="media-frame">
                    <div class="posterBigFrame">
                        <!-- Katman A -->
                        <div id="mediaLayerA" class="media-layer active">
                            <img id="mediaImageA">
                            <video id="mediaVideoA" muted playsinline></video>
                        </div>
                        <!-- Katman B -->
                        <div id="mediaLayerB" class="media-layer">
                            <img id="mediaImageB">
                            <video id="mediaVideoB" muted playsinline></video>
                        </div>
                        <!-- Boş durum -->
                        <div id="mediaEmpty" class="media-empty">
                            <div class="media-empty-icon">▶</div>
                            <div>Medya içeriği bekleniyor…</div>
                        </div>
                    </div>
                    <!-- İlerleme çubuğu -->
                    <div class="media-progress-wrap">
                        <div id="mediaProgress" class="media-progress-fill"></div>
                    </div>
                </div>

                <div class="media-footer">
                    <div id="mediaDesc" class="media-desc"></div>
                    <div id="slideCounter" class="slide-counter"></div>
                </div>
            </div>

        </div>
    </div>

{% endblock %}
